name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  engine:
    name: engine (lint · types · tests)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (with dev + viz extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,viz]"
      - name: Ruff (lint)
        run: ruff check src tests experiments
      - name: Mypy (types)
        run: mypy src
      - name: Pytest
        run: pytest -q

  ui:
    name: ui (typecheck · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/ux/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/ux/web/package-lock.json
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
